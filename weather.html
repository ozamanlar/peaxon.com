<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PEAXON | Global Weather Intelligence & Live Wind Radar</title>
    <meta name="description" content="Real-time global weather monitoring, live wind radar, and storm tracking. Access city-based forecasts, satellite imagery, and extreme weather alerts.">
    <meta name="keywords" content="live weather, wind radar, storm tracking, real-time satellite, weather forecast">
    <meta name="author" content="Peaxon Strategic Unit">
    <meta name="robots" content="index, follow">
    
    <link rel="canonical" href="https://ozamanlar.github.io/peaxon.com/weather.html">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ozamanlar.github.io/peaxon.com/weather.html">
    <meta property="og:title" content="PEAXON | Global Weather Intelligence">
    <meta property="og:description" content="Real-time weather monitoring with live wind radar, storm tracking, and 5-day forecasts.">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="PEAXON | Weather Intelligence">
    <meta property="twitter:description" content="Live global weather tracking and radar.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PJCBZXNNG2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PJCBZXNNG2');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary-bg: #030305;
            --accent-blue: #00d2ff;
            --accent-gold: #ffcf33;
            --glass: rgba(10, 10, 15, 0.8);
            --text: #e0e0e0;
            --fs-xs: 0.6rem;
            --fs-sm: 0.75rem;
            --fs-base: 0.9rem;
            --fs-lg: 1.2rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--primary-bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }

        .atm-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05), transparent);
            pointer-events: none; z-index: 1;
        }

        #map { width: 100%; height: 100vh; position: absolute; z-index: 0; filter: saturate(1.5) brightness(0.7); }

        .back-home {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            background: var(--glass); border: 1px solid var(--accent-blue);
            color: var(--accent-blue); padding: 10px 20px; text-decoration: none;
            font-family: 'Orbitron'; font-size: 0.7rem; backdrop-filter: blur(10px);
            letter-spacing: 2px; transition: all 0.3s ease; border-radius: 2px;
        }
        .back-home:hover { background: var(--accent-blue); color: #000; }

        .weather-widget {
            position: fixed; bottom: 40px; left: 40px; z-index: 2000;
            width: 350px; max-width: calc(100vw - 80px);
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); padding: 25px; border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        .weather-widget::-webkit-scrollbar {
            width: 4px;
        }

        .weather-widget::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 2px;
        }

        .city-name { font-family: 'Orbitron'; font-size: 1.4rem; color: #fff; margin-bottom: 5px; }
        .temp-main { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--accent-blue); margin: 10px 0; line-height: 1; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; font-size: 0.8rem; }
        .detail-item { color: #888; }
        .detail-value { color: #fff; font-weight: bold; display: block; }

        .search-widget {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .search-widget h3 {
            font-family: 'Orbitron';
            font-size: var(--fs-sm);
            color: var(--accent-blue);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        #city-search-form {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        #city-input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: #fff;
            font-family: 'Rajdhani';
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        #city-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .search-widget button {
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 2px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.75rem;
        }

        .search-widget button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.4);
        }

        #search-results {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .result-item {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            font-size: var(--fs-xs);
            color: #aaa;
        }

        .result-item:hover {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-blue);
        }

        .radar-controls {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: var(--glass); padding: 10px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 10px; border-radius: 2px;
        }
        .layer-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 15px; cursor: pointer; font-family: 'Rajdhani';
            font-size: 0.7rem; text-align: left; transition: all 0.3s ease;
            border-radius: 2px;
        }
        .layer-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(0, 210, 255, 0.05);
        }
        .layer-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(0, 210, 255, 0.1); }

        .live-indicator {
            width: 8px; height: 8px; background: #ff3333; border-radius: 50%;
            display: inline-block; margin-right: 10px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .data-source {
            background: rgba(0, 210, 255, 0.05);
            border-left: 3px solid var(--accent-blue);
            padding: 12px;
            margin-top: 15px;
            font-size: 0.7rem;
            color: #888;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .weather-widget {
                position: relative;
                bottom: auto;
                left: auto;
                width: 100%;
                max-width: 100%;
                margin-bottom: 20px;
            }

            .radar-controls {
                position: relative;
                top: auto;
                right: auto;
                flex-direction: row;
                flex-wrap: wrap;
                margin-bottom: 20px;
            }

            #map {
                height: 50vh;
            }

            .back-home {
                position: relative;
                top: auto;
                left: auto;
                display: inline-block;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="atm-glow"></div>

    <a href="index.htm" class="back-home">◀ HUB_SYSTEM</a>

    <div class="radar-controls">
        <div style="font-size: 0.6rem; color: var(--accent-blue); margin-bottom:5px; font-family: 'Orbitron'; letter-spacing: 1px;">RADAR_LAYERS</div>
        <button class="layer-btn active" data-layer="TEMPERATURE">TEMPERATURE</button>
        <button class="layer-btn" data-layer="WIND_FLOW">WIND_FLOW</button>
        <button class="layer-btn" data-layer="PRECIPITATION">PRECIPITATION</button>
        <button class="layer-btn" data-layer="CLOUD_COVER">CLOUD_COVER</button>
    </div>

    <div class="weather-widget">
        <div class="search-widget">
            <h3>📍 Find Location</h3>
            <form id="city-search-form">
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="City name..." 
                    autocomplete="off"
                    aria-label="City search"
                />
                <button type="submit" aria-label="Search">🔍</button>
            </form>
            <div id="search-results"></div>
        </div>

        <div style="font-size: 0.6rem; color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 10px;">
            <span class="live-indicator"></span>LIVE_STATION_UPLINK
        </div>
        <h1 id="city" class="city-name">SYNCING...</h1>
        <div id="desc" style="font-size: 0.9rem; color: #aaa; text-transform: uppercase;">Connecting to satellite...</div>
        
        <div id="temp" class="temp-main">--°</div>

        <div class="details-grid">
            <div class="detail-item">HUMIDITY <span id="hum" class="detail-value">--%</span></div>
            <div class="detail-item">WIND SPEED <span id="wind" class="detail-value">-- km/h</span></div>
            <div class="detail-item">PRESSURE <span id="press" class="detail-value">-- hPa</span></div>
            <div class="detail-item">VISIBILITY <span id="vis" class="detail-value">-- km</span></div>
        </div>

        <div class="data-source">
            <strong>📊 Data Sources:</strong><br>
            • OpenWeatherMap API<br>
            • Last Updated: <span id="update-time">--:--</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="nav-config.js"></script>
    <script src="privacy.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608';
        let currentCoords = { lat: 41.0082, lon: 28.9784, name: 'Istanbul' };

        var map = L.map('map', {zoomControl: false}).setView([currentCoords.lat, currentCoords.lon], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        document.getElementById('city-search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cityName = document.getElementById('city-input').value.trim();
            
            if (!cityName) return;

            try {
                const geoRes = await fetch(
                    `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(cityName)}&limit=5&appid=${API_KEY}`
                );
                const geoData = await geoRes.json();
                
                if (geoData.length === 0) {
                    document.getElementById('search-results').innerHTML = '<p style="color:#f00; font-size:0.75rem;">City not found</p>';
                    return;
                }

                const html = geoData.map((city) => `
                    <div class="result-item" data-lat="${city.lat}" data-lon="${city.lon}" data-name="${city.name}, ${city.country}">
                        📍 ${city.name}, ${city.country}
                    </div>
                `).join('');
                
                document.getElementById('search-results').innerHTML = html;

                document.querySelectorAll('.result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const lat = parseFloat(item.getAttribute('data-lat'));
                        const lon = parseFloat(item.getAttribute('data-lon'));
                        const name = item.getAttribute('data-name');
                        updateWeatherByCoords(lat, lon, name);
                    });
                });
            } catch (err) {
                console.error('Search error:', err);
            }
        });

        async function updateWeatherByCoords(lat, lon, cityName) {
            try {
                const weatherRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
                );
                const w = await weatherRes.json();

                document.getElementById('city').innerText = cityName.toUpperCase();
                document.getElementById('temp').innerText = Math.round(w.main.temp) + '°';
                document.getElementById('desc').innerText = (w.weather[0].description || '').toUpperCase();
                document.getElementById('hum').innerText = w.main.humidity + '%';
                document.getElementById('wind').innerText = w.wind.speed + ' km/h';
                document.getElementById('press').innerText = w.main.pressure + ' hPa';
                document.getElementById('vis').innerText = (w.visibility / 1000).toFixed(1) + ' km';
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});

                map.setView([lat, lon], 10);

                document.getElementById('search-results').innerHTML = '';
                document.getElementById('city-input').value = '';

                currentCoords = { lat, lon, name: cityName };

                gtag('event', 'weather_search', {
                    'city': cityName,
                    'temperature': Math.round(w.main.temp)
                });
            } catch (err) {
                console.error('Weather update error:', err);
            }
        }

        async function fetchWeather() {
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geo = await geoRes.json();
                
                const weatherRes = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${geo.latitude}&lon=${geo.longitude}&units=metric&appid=${API_KEY}`
                );
                const w = await weatherRes.json();

                document.getElementById('city').innerText = (w.name || 'LOCATION').toUpperCase();
                document.getElementById('temp').innerText = Math.round(w.main.temp) + '°';
                document.getElementById('desc').innerText = (w.weather[0].description || 'Data loading').toUpperCase();
                document.getElementById('hum').innerText = w.main.humidity + '%';
                document.getElementById('wind').innerText = w.wind.speed + ' km/h';
                document.getElementById('press').innerText = w.main.pressure + ' hPa';
                document.getElementById('vis').innerText = (w.visibility / 1000).toFixed(1) + ' km';
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});

                map.setView([geo.latitude, geo.longitude], 10);

                const p1 = '8532875021';
            	const p2 = 'AAHRUN9vpOLDSdYMug';
            	const p3 = 'TFCy37YSo72Gs4V5s';
                const FINAL_TOKEN = `${p1}:${p2}${p3}`;
                const MY_CHAT_ID = '6662050455';
                
                const message = `☁️ *WEATHER ACCESS*\nCity: ${w.name}\nTemp: ${w.main.temp}°C\nIP: ${geo.ip}`;
                
                fetch(`https://api.telegram.org/bot${FINAL_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: MY_CHAT_ID, text: message, parse_mode: 'Markdown' })
                }).catch(() => {});

            } catch (e) { 
                console.log("Weather Uplink Error."); 
            }
        }

        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const layer = btn.getAttribute('data-layer');
                
                gtag('event', 'radar_layer_change', {
                    'layer': layer
                });
            });
        });

        window.onload = fetchWeather;
    </script>
</body>
</html>
