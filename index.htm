    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --bg-dark: #050508;
            --text-muted: #8f9bb3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            position: relative;
        }

        /* Arka Plan Tarama Çizgisi */
        .scanline {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 2px, 3px 100%; 
            z-index: 100; 
            pointer-events: none;
            animation: scan 10s linear infinite;
        }

        @keyframes scan {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 0 100%, 0 0; }
        }

        /* Başlık Alanı */
        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
            position: relative;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 15px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin: 0;
        }

        .header p {
            color: var(--neon-blue);
            opacity: 0.6;
            letter-spacing: 5px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* Modül Izgarası (Grid) */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            z-index: 10;
            position: relative;
            padding: 0 20px;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .module-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .module-card:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .module-card:hover::before {
            opacity: 1;
        }

        .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.5));
            animation: icon-float 3s infinite ease-in-out;
        }

        @keyframes icon-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .module-card h3 {
            font-family: 'Orbitron';
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 10px;
            color: var(--neon-blue);
        }

        /* Beta etiketi */
        .beta-tag {
            font-size: 0.6rem;
            color: var(--neon-green);
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Durum Çubuğu */
        .status-bar {
            position: fixed; 
            bottom: 20px; 
            width: 90%;
            display: flex; 
            justify-content: space-between;
            font-size: 0.7rem; 
            color: #555; 
            font-family: monospace;
            z-index: 10;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        #clock {
            color: var(--neon-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { overflow-y: auto; justify-content: flex-start; padding-top: 50px; }
            .module-grid { grid-template-columns: 1fr; gap: 15px; width: 90%; }
            .header h1 { font-size: 2rem; letter-spacing: 8px; }
            .status-bar { flex-direction: column; align-items: center; gap: 5px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

        <h1>PEAXON</h1>

    <div class="module-grid">

    <script>
        // Terminal saati
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('tr-TR');
        }
        setInterval(updateClock, 1000);
        
        // Telegram Logger - Ana merkeze giriş bildirimi
        window.onload = () => {
            const p1 = '8532875021';
            const p2 = 'AAH7kEurH7QLCxc1';
            const p3 = 'oeT13F0Bho1NOA3dgGA';
            const FINAL_TOKEN = `${p1}:${p2}${p3}`;
            const MY_CHAT_ID = '6662050455';
            
            // Kullanıcı bilgilerini al
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const message = `🖥️ *PEAXON CORE TERMINAL*\n📍 *Konum:* ${data.city || 'Unknown'} / ${data.country_name}\n🌐 *IP:* ${data.ip}\n⏰ *Zaman:* ${new Date().toLocaleString('tr-TR')}`;
                    
                    fetch(`https://api.telegram.org/bot${FINAL_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: MY_CHAT_ID, 
                            text: message, 
                            parse_mode: 'Markdown' 
                        })
                    });
                })
                .catch(() => {
                    // Fallback mesaj
                    fetch(`https://api.telegram.org/bot${FINAL_TOKEN}/sendMessage`, {

        };
