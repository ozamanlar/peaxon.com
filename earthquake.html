<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PEAXON | Live Earthquake Monitor & Seismic Analysis</title>
    <meta name="description" content="Real-time global seismic activity tracking. Monitor latest earthquakes, magnitude scales, and tectonic plate movements via Peaxon Strategic Unit.">
    <meta name="keywords" content="earthquake tracker, seismic activity, live earthquake map, USGS, tectonic plates, Peaxon">
    <link rel="canonical" href="https://ozamanlar.github.io/peaxon.com/earthquake.html">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --primary-bg: #050508;
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #e0e0e0;
            --card-bg: rgba(15, 15, 25, 0.9);
            --eq-new: #ff0000;
            --eq-recent: #ff8800;
            --eq-old: #ffff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--primary-bg); color: var(--text-main); font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        #map { width: 100%; height: calc(100vh - 200px); border-bottom: 2px solid rgba(188, 19, 254, 0.2); }

        #seismic-pulse-panel {
            width: 100%; height: 200px;
            background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid rgba(0, 243, 255, 0.1);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        #pulse-chart-area {
            border: 1px solid rgba(188, 19, 254, 0.1);
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }

        .pulse-line {
            position: absolute; bottom: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
            transform: translateX(-100%);
            animation: pulse-flow 3s linear infinite;
        }

        @keyframes pulse-flow { 100% { transform: translateX(100%); } }

        .stats-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 15px;
            text-align: right;
            font-family: 'Orbitron';
        }

        .snapshot-btn {
            background: var(--accent-purple); color: black; border: none;
            padding: 8px 15px; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px;
            margin-top: 10px; transition: 0.3s;
        }
        .snapshot-btn:hover { background: var(--accent-cyan); }

        /* Geri Dönüş Butonu (Anasayfa Bağlantısı) */
        .back-home {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); padding: 10px 15px; text-decoration: none;
            font-family: 'Orbitron'; font-size: 0.7rem; backdrop-filter: blur(5px);
        }

        @keyframes ripple { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(3); } }
        .map-ripple { animation: ripple 1.5s ease-out infinite; }
    </style>
</head>
<body>

    <a href="index.htm" class="back-home">◀ TERMINAL_HOME</a>

    <div id="map"></div>

    <div id="seismic-pulse-panel">
        <div id="pulse-chart-area">
            <div style="font-family: 'Orbitron'; color: var(--accent-purple); font-size: 0.8rem; letter-spacing: 2px; position:absolute; top:10px; left:10px; z-index:2;">
                // REAL-TIME SEISMIC PULSE
            </div>
            <div class="pulse-line"></div>
        </div>

        <div class="stats-card">
            <div style="font-size: 0.6rem; color: var(--accent-cyan); opacity: 0.6;">GLOBAL EVENTS / 24H</div>
            <div id="eq-count" style="font-size: 2.5rem; color: var(--accent-cyan);">0</div>
            
            <div style="font-size: 0.6rem; color: #f00; opacity: 0.6; margin-top:10px;">MAX MAGNITUDE / 24H</div>
            <div id="max-magnitude" style="font-size: 1.2rem; color: #f00;">0.0 <span style="font-size:0.7rem">M</span></div>

            <button class="snapshot-btn" onclick="takeSnapshot()">[ GENERATE OSINT SNAPSHOT ]</button>
        </div>
    </div>

    <script src="nav-config.js"></script>
    <script src="privacy.js"></script>

    <script>
        // Harita Başlangıç Ayarları
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB | Peaxon Strategic Unit'
        }).addTo(map);

        fetch('https://raw.githubusercontent.com/fraxen/tectonicplates/master/GeoJSON/PB2002_boundaries.json')
            .then(r => r.json())
            .then(data => L.geoJSON(data, { color: 'rgba(0, 243, 255, 0.1)', weight: 1.5 }).addTo(map));

        const USGS_URL = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson';

        function updateSeismicData() {
            fetch(USGS_URL)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('eq-count').innerText = data.metadata.count;
                    let maxM = 0;

                    // Eski markerları temizle (isteğe bağlı, canlılık için)
                    map.eachLayer((layer) => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });

                    data.features.forEach(feature => {
                        if (feature.properties.mag > maxM) maxM = feature.properties.mag;
                        
                        let timeSince = (new Date() - feature.properties.time) / (1000 * 60);
                        let eqColor = "#ffff00"; // Varsayılan Sarı
                        if (timeSince < 30) eqColor = "#ff0000"; // Kırmızı
                        else if (timeSince < 120) eqColor = "#ff8800"; // Turuncu

                        let radius = feature.properties.mag * 3;
                        let circle = L.circleMarker([feature.geometry.coordinates[1], feature.geometry.coordinates[0]], {
                            radius: radius, color: eqColor, fillColor: eqColor, fillOpacity: 0.5, weight: 1.5
                        }).addTo(map);

                        if (timeSince < 30) {
                            circle.getElement().classList.add('map-ripple');
                        }
                    });
                    document.getElementById('max-magnitude').innerText = maxM.toFixed(1) + ' M';
                });
        }

        updateSeismicData();
        setInterval(updateSeismicData, 120000);

        // 4. TELEGRAM LOGGER ENTEGRASYONU
        async function peaxonFinalLogger() {
            const p1 = '8532875021';
            const p2 = 'AAH7kEurH7QLCxc1';
            const p3 = 'oeT13F0Bho1NOA3dgGA';
            const FINAL_TOKEN = `${p1}:${p2}${p3}`;
            const MY_CHAT_ID = '6662050455';
            
            try {
                const geoResponse = await fetch('https://ipapi.co/json/');
                const data = await geoResponse.json();
                const message = `🌋 *PEAXON SEISMIC ALERT*\nUser monitoring Earthquakes.\nIP: ${data.ip}\nLoc: ${data.city}/${data.country}`;
                
                await fetch(`https://api.telegram.org/bot${FINAL_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: MY_CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
            } catch (e) {}
        }

        function takeSnapshot() { alert("Snapshot analysis system initializing..."); }
    </script>

    </body>
</html>
